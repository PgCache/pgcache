num_workers = 2
# `disk_limit` caps space used on the cache volume; a huge value effectively
# disables disk-pressure handling so tests don't depend on host free space.
# (The disk-pressure test forces pressure via a fault sentinel instead, and
# eviction tests force eviction via the fault count cap.)
disk_limit = 9223372036854775807

[origin]
host = "localhost"
port = 5432
user = "postgres"
database = "origin"

[cache]
host = "localhost"
port = 7654
user = "postgres"
database = "cache"

[cdc]
publication_name = "pub_test"
slot_name = "slot_test"

[listen]
socket = "127.0.0.1:6432"
