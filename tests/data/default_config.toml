num_workers = 2
# Explicit disk limit so tests don't depend on the host disk's free space
# (the auto-derived limit forces full eviction on a mostly-full volume).
cache_size = 1073741824 # 1 GiB

[origin]
host = "localhost"
port = 5432
user = "postgres"
database = "origin"

[cache]
host = "localhost"
port = 7654
user = "postgres"
database = "cache"

[cdc]
publication_name = "pub_test"
slot_name = "slot_test"

[listen]
socket = "127.0.0.1:6432"
